name: Quality checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.8
      uses: actions/setup-python@v6
      with:
        python-version: 3.8
    - name: Install Python dependencies
      run: pip install black
    - name: Run quality check
      run: make quality